# NegamaxParIncAIStud — Configuration runtime

time_limit_ms              = 1000 # budget temps par coup en millisecondes
max_depth                  = 20   # profondeur maximale (cap de sécurité, jamais atteinte en pratique)

parallel_threshold         = 2    # profondeur en dessous de laquelle on bascule en séquentiel
sort_depth                 = 2    # profondeur du tri heuristique (1=eval statique, 2=mini-search)

lmr_min_depth              = 3
use_log_reduction          = true # true=formule log, false=formule linéaire
lmr_alpha                  = 0.3
lmr_k                      = 12   # granularité formule lin  [8–16]
lmr_nullwindow_before_full = true # true=null-window puis full, false=full direct

lmp_enabled                = false # activer Late Move Pruning
lmp_prune_ratio            = 0.25  # fraction des coups tail élagués [0.0–0.5]
